<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULearn SIS Admin</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --sidebar-bg: #1a1d23;
  --sidebar-hover: #2a2d35;
  --sidebar-active: #32363f;
  --sidebar-text: #8b8f98;
  --sidebar-text-active: #f0f0f2;
  --content-bg: #f4f3f0;
  --card-bg: #ffffff;
  --card-border: #e5e4e0;
  --text-primary: #1a1d23;
  --text-secondary: #6b6e76;
  --text-muted: #9b9ea6;
  --accent: #2563eb;
  --accent-hover: #1d4ed8;
  --accent-light: #eff3fe;
  --danger: #dc2626;
  --danger-hover: #b91c1c;
  --success: #059669;
  --warning: #d97706;
  --font-body: 'DM Sans', -apple-system, sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;
  --radius: 6px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 36px rgba(0,0,0,0.12);
  --transition: 150ms ease;
  --bg-main: #f4f3f0;
  --bg-subtle: var(--bg-subtle);
  --bg-muted: var(--bg-muted);
}

html, body { height: 100%; font-family: var(--font-body); background: var(--content-bg); color: var(--text-primary); font-size: 14px; line-height: 1.5; }

/* LAYOUT */
.app { display: flex; height: 100vh; overflow: hidden; }

/* SIDEBAR */
.sidebar {
  width: 220px; min-width: 220px; background: var(--sidebar-bg);
  display: flex; flex-direction: column; padding: 0; user-select: none;
  border-right: 1px solid rgba(255,255,255,0.06);
}
.sidebar-logo {
  padding: 20px 18px 16px; border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: center; gap: 10px;
}
.sidebar-logo .logo-icon {
  width: 32px; height: 32px; background: var(--accent); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; color: #fff; font-size: 13px; letter-spacing: -0.5px;
}
.sidebar-logo .logo-text { color: var(--sidebar-text-active); font-weight: 600; font-size: 15px; letter-spacing: -0.3px; }
.sidebar-logo .logo-sub { color: var(--sidebar-text); font-size: 10px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 1px; margin-top: 1px; }

.sidebar-nav { flex: 1; padding: 12px 8px; overflow-y: auto; }
.sidebar-section { margin-bottom: 16px; }
.sidebar-section-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px;
  color: var(--sidebar-text); padding: 4px 12px 6px; font-weight: 600;
  font-family: var(--font-mono);
}
.sidebar-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-radius: var(--radius); cursor: pointer;
  color: var(--sidebar-text); font-size: 13px; font-weight: 500;
  transition: all var(--transition); position: relative;
}
.sidebar-item:hover { background: var(--sidebar-hover); color: var(--sidebar-text-active); }
.sidebar-item.active { background: var(--sidebar-active); color: var(--sidebar-text-active); }
.sidebar-item.active::before {
  content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 3px; height: 16px; background: var(--accent); border-radius: 0 3px 3px 0;
}
.sidebar-item svg { width: 16px; height: 16px; opacity: 0.6; flex-shrink: 0; }
.sidebar-item.active svg, .sidebar-item:hover svg { opacity: 1; }
.sidebar-count {
  margin-left: auto; font-size: 11px; font-family: var(--font-mono);
  background: rgba(255,255,255,0.08); padding: 1px 6px; border-radius: 10px;
}
.sidebar-footer {
  padding: 12px 18px; border-top: 1px solid rgba(255,255,255,0.06);
  font-size: 10px; color: var(--sidebar-text); font-family: var(--font-mono);
}

/* MAIN */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* BROWSER-STYLE TABS */
.tab-bar {
  display: flex; align-items: flex-end; gap: 0; background: var(--bg-muted);
  padding: 6px 8px 0; min-height: 38px; overflow-x: auto; flex-shrink: 0;
}
.tab-bar::-webkit-scrollbar { display: none; }
.browser-tab {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 12px; font-size: 12px; font-weight: 500; cursor: pointer;
  background: #dddcd8; color: var(--text-secondary); border-radius: 8px 8px 0 0;
  white-space: nowrap; max-width: 200px; position: relative; user-select: none;
  transition: background 100ms ease;
}
.browser-tab:hover { background: #f0efec; }
.browser-tab.active { background: var(--card-bg); color: var(--text-primary); font-weight: 600; }
.browser-tab .tab-label { overflow: hidden; text-overflow: ellipsis; }
.browser-tab .tab-close {
  width: 16px; height: 16px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-size: 14px;
  color: var(--text-muted); cursor: pointer; flex-shrink: 0;
  transition: all 100ms ease; line-height: 1;
}
.browser-tab .tab-close:hover { background: rgba(0,0,0,0.1); color: var(--text-primary); }
.browser-tab[draggable]:active { cursor: grabbing; }
.browser-tab { cursor: grab; }

/* Student preview */
.preview-btn {
  visibility: hidden; cursor: pointer; color: var(--text-muted); margin-left: 6px;
  vertical-align: middle; padding: 2px 4px; border-radius: 4px;
  transition: all 100ms ease; display: inline-flex;
}
.preview-btn:hover { color: var(--accent); background: var(--accent-light); }
tr:hover .preview-btn { visibility: visible; }
tr.preview-active { background: var(--accent-light) !important; }
tr.preview-active td { border-bottom-color: rgba(37,99,235,0.15); }

/* Template tree */
.tpl-tree-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 12px; cursor: pointer; font-size: 13px; font-weight: 500;
  color: var(--text-secondary); transition: all 100ms ease; border-radius: 4px; margin: 1px 6px;
}
.tpl-tree-item:hover { background: #eeedea; color: var(--text-primary); }
.tpl-tree-item.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
.tpl-tree-count {
  font-size: 11px; font-family: var(--font-mono); color: var(--text-muted);
  background: rgba(0,0,0,0.04); padding: 0 5px; border-radius: 8px; min-width: 20px; text-align: center;
}
.tpl-tree-item.active .tpl-tree-count { background: rgba(37,99,235,0.1); color: var(--accent); }

.topbar {
  height: 44px; min-height: 44px; background: var(--card-bg);
  border-bottom: 1px solid var(--card-border); display: flex;
  align-items: center; padding: 0 24px; gap: 12px;
}
.topbar-title { font-weight: 600; font-size: 15px; letter-spacing: -0.3px; }
.topbar-breadcrumb { color: var(--text-muted); font-size: 13px; }
.topbar-breadcrumb span { cursor: pointer; color: var(--accent); }
.topbar-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }

.content { flex: 1; overflow-y: auto; padding: 20px 24px; }

/* BUTTONS */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: var(--radius); font-size: 13px;
  font-weight: 500; cursor: pointer; border: none; font-family: var(--font-body);
  transition: all var(--transition); white-space: nowrap;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-secondary { background: var(--card-bg); color: var(--text-primary); border: 1px solid var(--card-border); }
.btn-secondary:hover { background: #f8f8f6; border-color: #ccc; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: var(--danger-hover); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-ghost { background: transparent; color: var(--text-secondary); padding: 4px 8px; }
.btn-ghost:hover { background: rgba(0,0,0,0.04); color: var(--text-primary); }
.btn svg { width: 14px; height: 14px; }

/* SEARCH */
.search-bar {
  display: flex; align-items: center; gap: 8px;
  background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: var(--radius); padding: 0 12px; height: 36px;
}
.search-bar svg { width: 15px; height: 15px; color: var(--text-muted); flex-shrink: 0; }
.search-bar input {
  border: none; outline: none; background: transparent;
  font-size: 13px; font-family: var(--font-body); width: 240px; color: var(--text-primary);
}
.search-bar input::placeholder { color: var(--text-muted); }

/* TOOLBAR */
.toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.toolbar-right { margin-left: auto; display: flex; gap: 8px; }

/* TABLE */
.table-wrap { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius); overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
th {
  text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted);
  background: var(--bg-subtle); border-bottom: 1px solid var(--card-border);
  font-family: var(--font-mono); white-space: nowrap;
}
td {
  padding: 10px 14px; border-bottom: 1px solid #f0efec; font-size: 13px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px;
}
tr.clickable { cursor: pointer; }
tr.clickable:hover td { background: var(--accent-light); }
tr:last-child td { border-bottom: none; }

.table-empty { padding: 40px; text-align: center; color: var(--text-muted); font-size: 13px; }

/* PAGINATION */
.pagination { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--bg-subtle); border-top: 1px solid var(--card-border); font-size: 12px; color: var(--text-secondary); }
.pagination-btns { display: flex; gap: 4px; }
.pagination-btns button {
  padding: 4px 10px; border: 1px solid var(--card-border); background: var(--card-bg);
  border-radius: 4px; cursor: pointer; font-size: 12px; font-family: var(--font-body);
}
.pagination-btns button:hover { background: #f0f0ee; }
.pagination-btns button:disabled { opacity: 0.4; cursor: default; }

/* BADGES */
.badge {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
  font-family: var(--font-mono); text-transform: uppercase;
}
.badge-enquiry { background: #f3f4f6; color: #6b7280; }
.badge-pending { background: #fef3c7; color: #92400e; }
.badge-confirmed { background: #d1fae5; color: #065f46; }
.badge-checked_in { background: #dbeafe; color: #1e40af; }
.badge-checked_out { background: #e0e7ff; color: #3730a3; }
.badge-completed { background: #d1fae5; color: #065f46; }
.badge-cancelled { background: #fee2e2; color: #991b1b; }

/* CARD */
.card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius); }
.card-header {
  padding: 14px 18px; border-bottom: 1px solid var(--card-border);
  display: flex; align-items: center; justify-content: space-between;
}
.card-header h3 { font-size: 13px; font-weight: 600; letter-spacing: -0.2px; }
.card-body { padding: 18px; }

/* FORM */
.form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group.full { grid-column: 1 / -1; }
.form-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); font-family: var(--font-mono); }
.form-input, .form-select, .form-textarea {
  padding: 7px 10px; border: 1px solid var(--card-border); border-radius: 4px;
  font-size: 13px; font-family: var(--font-body); color: var(--text-primary);
  background: var(--card-bg); transition: border var(--transition);
}
.form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(37,99,235,0.1); }
.form-textarea { resize: vertical; min-height: 60px; }
.form-checkbox { display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; }
.form-checkbox input { accent-color: var(--accent); }
.form-section-title {
  grid-column: 1 / -1; font-size: 12px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--text-secondary); padding: 8px 0 2px;
  border-top: 2px solid var(--card-border); margin-top: 4px;
}

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(2px);
  display: flex; align-items: flex-start; justify-content: center; padding: 60px 20px;
  z-index: 1000; overflow-y: auto;
}
.modal {
  background: var(--card-bg); border-radius: 8px; box-shadow: var(--shadow-lg);
  width: 100%; max-width: 720px; animation: modalIn 200ms ease;
}
@keyframes modalIn { from { opacity: 0; transform: translateY(-10px); } }
.modal-header {
  padding: 16px 20px; border-bottom: 1px solid var(--card-border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-header h2 { font-size: 15px; font-weight: 600; }
.modal-body { padding: 20px; max-height: 70vh; overflow-y: auto; }
.modal-footer { padding: 14px 20px; border-top: 1px solid var(--card-border); display: flex; justify-content: flex-end; gap: 8px; }

/* DETAIL SECTIONS */
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.detail-section { margin-bottom: 20px; }
.detail-section:last-child { margin-bottom: 0; }
.section-title {
  font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
  color: var(--text-secondary); margin-bottom: 10px; padding-bottom: 6px;
  border-bottom: 2px solid var(--card-border);
}

/* NESTED ITEMS */
.nested-item {
  background: var(--bg-subtle); border: 1px solid var(--card-border); border-radius: var(--radius);
  padding: 12px 14px; margin-bottom: 8px;
}
.nested-item:last-child { margin-bottom: 0; }
.nested-item-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.nested-item-title { font-weight: 600; font-size: 13px; }
.nested-item-meta { font-size: 12px; color: var(--text-secondary); font-family: var(--font-mono); }
.nested-item-row { display: flex; gap: 16px; flex-wrap: wrap; }
.nested-item-field { font-size: 12px; }
.nested-item-field .label { color: var(--text-muted); font-family: var(--font-mono); text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; }
.nested-item-field .value { font-weight: 500; }

/* INLINE COURSE/ACCOM FORM */
.inline-add { border: 1px dashed var(--card-border); border-radius: var(--radius); padding: 12px; margin-top: 8px; }
.inline-add .form-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }

/* TABS */
.tabs { display: flex; gap: 0; border-bottom: 2px solid var(--card-border); margin-bottom: 16px; }
.tab {
  padding: 8px 16px; font-size: 13px; font-weight: 500; cursor: pointer;
  color: var(--text-muted); border-bottom: 2px solid transparent;
  margin-bottom: -2px; transition: all var(--transition);
}
.tab:hover { color: var(--text-primary); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* TOAST */
.toast {
  position: fixed; bottom: 20px; right: 20px; padding: 12px 18px;
  background: var(--sidebar-bg); color: #fff; border-radius: var(--radius);
  font-size: 13px; box-shadow: var(--shadow-lg); z-index: 2000;
  animation: toastIn 300ms ease; display: none;
}
.toast.show { display: block; }
.toast.error { background: var(--danger); }
@keyframes toastIn { from { opacity: 0; transform: translateY(10px); } }

/* STATUS FILTER */
.filter-select {
  padding: 6px 10px; border: 1px solid var(--card-border); border-radius: 4px;
  font-size: 12px; font-family: var(--font-body); background: var(--card-bg);
  color: var(--text-primary); cursor: pointer;
}

/* AMOUNT */
.amount { font-family: var(--font-mono); font-weight: 500; }
.amount-positive { color: var(--success); }
.amount-negative { color: var(--danger); }

/* COLLAPSIBLE */
.collapse-header {
  display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none;
}
.collapse-header::after {
  content: '\25B6'; font-size: 10px; color: var(--text-muted); transition: transform 200ms;
}
.collapse-header.open::after { transform: rotate(90deg); }
.collapse-body { display: none; }
.collapse-body.open { display: block; }

/* HIDDEN */
.hidden { display: none !important; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #d0d0cc; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #b0b0ac; }
</style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">U</div>
      <div>
        <div class="logo-text">ULearn SIS</div>
        <div class="logo-sub">Admin Panel</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section">
        <div class="sidebar-section-label">Management</div>
        <div class="sidebar-item" data-view="students" onclick="openTab('students','Students')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Students
          <span class="sidebar-count" id="studentCount">0</span>
        </div>
        <div class="sidebar-item" data-view="bookings" onclick="openTab('bookings','Bookings')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Bookings
          <span class="sidebar-count" id="bookingCount">0</span>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-label">Scheduling</div>
        <div class="sidebar-item" data-view="classes" onclick="openTab('classes','Classes')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          Classes
        </div>
        <div class="sidebar-item" data-view="teachers" onclick="openTab('teachers','Teachers')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Teachers
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-label">Attendance</div>
        <div class="sidebar-item" data-view="attendance" onclick="openTab('attendance','Attendance')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          Attendance
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-label">Accommodation</div>
        <div class="sidebar-item" data-view="accommodation" onclick="openTab('accommodation','Accommodation')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Providers
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-label">Documents</div>
        <div class="sidebar-item" data-view="documents" onclick="openTab('documents','Documents')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          Documents
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-label">System</div>
        <div class="sidebar-item" onclick="checkHealth()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
          Health Check
        </div>
      </div>
    </nav>
    <div class="sidebar-footer">SIS v1.0</div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="tab-bar" id="tabBar"></div>
    <div class="topbar">
      <div class="topbar-title" id="topbarTitle">Students</div>
      <div class="topbar-breadcrumb" id="topbarBreadcrumb"></div>
      <div class="topbar-right" id="topbarRight"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/sis/api';
let currentView = 'students';
let studentPage = 1, bookingPage = 1;
let studentSearch = '', bookingSearch = '', bookingStatusFilter = '';

// ─── BROWSER-STYLE TAB SYSTEM ──────────────────

let tabs = [];       // [{id, view, opts, label, contentHtml, topbar}]
let activeTabId = null;
let tabCounter = 0;

// Labels for view types
const viewLabels = {
  students: 'Students', bookings: 'Bookings', classes: 'Classes', teachers: 'Teachers',
  attendance: 'Attendance', accommodation: 'Accommodation', documents: 'Documents',
  'student-detail': 'Student', 'booking-detail': 'Booking', 'class-detail': 'Class',
  'accommodation-detail': 'Accommodation', 'document-detail': 'Document',
  'document-templates': 'Templates', 'document-generate': 'Generate Doc',
};

function openTab(view, label, opts = {}) {
  // Check if this exact view is already open (for list views, reuse; for details, always new)
  const isDetail = view.includes('-detail') || view === 'document-templates' || view === 'document-generate';
  if (!isDetail) {
    const existing = tabs.find(t => t.view === view);
    if (existing) {
      switchToTab(existing.id);
      return;
    }
  }

  const id = ++tabCounter;
  const tab = { id, view, opts, label: label || viewLabels[view] || view };
  tabs.push(tab);
  switchToTab(id);
  loadView(view, opts);
}

function switchToTab(id) {
  // Save current tab's content before switching
  if (activeTabId) {
    const prev = tabs.find(t => t.id === activeTabId);
    if (prev) {
      prev.contentHtml = document.getElementById('content').innerHTML;
      prev.topbar = {
        title: document.getElementById('topbarTitle').innerHTML,
        breadcrumb: document.getElementById('topbarBreadcrumb').innerHTML,
        right: document.getElementById('topbarRight').innerHTML,
      };
    }
  }

  activeTabId = id;
  const tab = tabs.find(t => t.id === id);
  if (!tab) return;

  currentView = tab.view;

  // Restore content if we have it cached
  if (tab.contentHtml !== undefined) {
    document.getElementById('content').innerHTML = tab.contentHtml;
    if (tab.topbar) {
      document.getElementById('topbarTitle').innerHTML = tab.topbar.title;
      document.getElementById('topbarBreadcrumb').innerHTML = tab.topbar.breadcrumb;
      document.getElementById('topbarRight').innerHTML = tab.topbar.right;
    }
  }

  renderTabBar();
  highlightSidebar(tab.view);
}

function closeTab(id, event) {
  if (event) event.stopPropagation();
  const idx = tabs.findIndex(t => t.id === id);
  if (idx === -1) return;

  tabs.splice(idx, 1);

  if (tabs.length === 0) {
    // Open students as default
    openTab('students', 'Students');
    return;
  }

  if (activeTabId === id) {
    // Switch to nearest tab
    const newIdx = Math.min(idx, tabs.length - 1);
    switchToTab(tabs[newIdx].id);
    loadView(tabs[newIdx].view, tabs[newIdx].opts);
  }

  renderTabBar();
}

let dragTabId = null;

function renderTabBar() {
  const bar = document.getElementById('tabBar');
  bar.innerHTML = tabs.map(t =>
    `<div class="browser-tab ${t.id === activeTabId ? 'active' : ''}"
          draggable="true"
          data-tab-id="${t.id}"
          onclick="switchToTab(${t.id})"
          ondblclick="duplicateTab(${t.id})"
          ondragstart="tabDragStart(${t.id}, event)"
          ondragover="tabDragOver(event)"
          ondrop="tabDrop(${t.id}, event)"
          ondragend="tabDragEnd()"
          title="${esc(t.label)}">
      <span class="tab-label">${esc(t.label)}</span>
      <span class="tab-close" onclick="closeTab(${t.id}, event)">&times;</span>
    </div>`
  ).join('');
}

function duplicateTab(id) {
  const src = tabs.find(t => t.id === id);
  if (!src) return;
  // Force-open as new tab (bypass dedup for list views)
  const newId = ++tabCounter;
  const tab = { id: newId, view: src.view, opts: { ...src.opts }, label: src.label };
  tabs.push(tab);
  switchToTab(newId);
  loadView(tab.view, tab.opts);
}

function tabDragStart(id, e) {
  dragTabId = id;
  e.dataTransfer.effectAllowed = 'move';
  // Make the dragged tab slightly transparent
  setTimeout(() => {
    const el = document.querySelector(`[data-tab-id="${id}"]`);
    if (el) el.style.opacity = '0.4';
  }, 0);
}

function tabDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}

function tabDrop(targetId, e) {
  e.preventDefault();
  if (dragTabId === null || dragTabId === targetId) return;
  const fromIdx = tabs.findIndex(t => t.id === dragTabId);
  const toIdx = tabs.findIndex(t => t.id === targetId);
  if (fromIdx === -1 || toIdx === -1) return;
  const [moved] = tabs.splice(fromIdx, 1);
  tabs.splice(toIdx, 0, moved);
  renderTabBar();
}

function tabDragEnd() {
  dragTabId = null;
  document.querySelectorAll('.browser-tab').forEach(el => el.style.opacity = '');
}

function highlightSidebar(view) {
  // Map detail views back to their parent
  const parentView = view.replace('-detail', '').replace('document-templates', 'documents').replace('document-generate', 'documents');
  document.querySelectorAll('.sidebar-item[data-view]').forEach(el => {
    el.classList.toggle('active', el.dataset.view === parentView);
  });
}

function updateTabLabel(label) {
  const tab = tabs.find(t => t.id === activeTabId);
  if (tab) { tab.label = label; renderTabBar(); }
}

// ─── NAVIGATION (now routes through tab system) ──

function navigate(view, opts = {}) {
  const label = viewLabels[view] || view;
  // For sub-views (details etc), navigate within the current tab
  const isSubView = view.includes('-detail') || view === 'document-templates' || view === 'document-generate';
  if (isSubView && activeTabId) {
    const tab = tabs.find(t => t.id === activeTabId);
    if (tab) {
      tab.view = view;
      tab.opts = opts;
      tab.label = label + (opts.id ? ' #' + opts.id : '');
      renderTabBar();
    }
  }
  currentView = view;
  loadView(view, opts);
}

function loadView(view, opts = {}) {
  if (view === 'students') showStudentsList();
  else if (view === 'student-detail') showStudentDetail(opts.id);
  else if (view === 'bookings') showBookingsList();
  else if (view === 'booking-detail') showBookingDetail(opts.id);
  else if (view === 'classes') showClassesList();
  else if (view === 'class-detail') showClassDetail(opts.id);
  else if (view === 'teachers') showTeachersList();
  else if (view === 'attendance') showAttendance();
  else if (view === 'accommodation') showAccommodationList();
  else if (view === 'accommodation-detail') showAccommodationDetail(opts.id);
  else if (view === 'documents') showDocumentsList();
  else if (view === 'document-detail') showDocumentDetail(opts.id);
  else if (view === 'document-templates') showTemplatesList();
  else if (view === 'document-generate') showDocumentGenerate(opts);
}

// ─── API HELPERS ────────────────────────────────
async function api(path, opts = {}) {
  const { method = 'GET', body } = opts;
  const config = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) config.body = JSON.stringify(body);
  const res = await fetch(API + path, config);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => el.className = 'toast', 3000);
}

function formatDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-IE', { day: '2-digit', month: 'short', year: 'numeric' });
}

function formatMoney(v) {
  if (v == null) return '—';
  return '€' + parseFloat(v).toFixed(2);
}

function statusBadge(status) {
  if (!status) return '';
  return `<span class="badge badge-${status.toLowerCase()}">${status.replace('_', ' ')}</span>`;
}

function setTopbar(title, breadcrumb = '', rightHtml = '') {
  document.getElementById('topbarTitle').textContent = title;
  document.getElementById('topbarBreadcrumb').innerHTML = breadcrumb;
  document.getElementById('topbarRight').innerHTML = rightHtml;
}

// Preview pane email functions (mirror the profile ones but with pv* IDs)
async function loadPvEmailTemplateOptions() {
  try {
    const templates = await api('/documents/templates?all=true&type=email');
    const sel = document.getElementById('pvCommsTpl');
    if (!sel) return;
    const groups = {};
    for (const t of templates) { const c = t.category || 'other'; if (!groups[c]) groups[c] = []; groups[c].push(t); }
    let html = '<option value="">None — blank</option>';
    for (const cat of Object.keys(EMAIL_CAT_LABELS)) {
      const items = groups[cat]; if (!items) continue;
      html += '<optgroup label="'+EMAIL_CAT_LABELS[cat]+'">';
      for (const t of items) html += '<option value="'+t.id+'">'+esc(t.name)+'</option>';
      html += '</optgroup>';
    }
    sel.innerHTML = html;
  } catch(e) {}
}

async function loadPvEmailTemplate(studentId) {
  const tplId = document.getElementById('pvCommsTpl')?.value;
  if (!tplId) { document.getElementById('pvCommsEditor').innerHTML = ''; document.getElementById('pvCommsSubject').value = ''; return; }
  try {
    const tpl = await api('/documents/templates/' + tplId);
    if (!tpl) return;
    const tokens = await api('/documents/tokens/' + studentId);
    let html = tpl.htmlTemplate;
    html = html.replace(/\{\{([^}]+)\}\}/g, (m, key) => { const k = key.trim(); return tokens[k] !== undefined ? tokens[k] : m; });
    document.getElementById('pvCommsEditor').innerHTML = html;
    document.getElementById('pvCommsSubject').value = tpl.name;
  } catch(e) { toast(e.message, true); }
}

async function sendPvEmail(studentId) {
  const from = document.getElementById('pvCommsFrom')?.value;
  const to = document.getElementById('pvCommsTo')?.value;
  const subject = document.getElementById('pvCommsSubject')?.value;
  const html = document.getElementById('pvCommsEditor')?.innerHTML;
  const templateId = document.getElementById('pvCommsTpl')?.value || null;
  const status = document.getElementById('pvCommsSendStatus');
  if (!to || !subject || !html?.trim()) { toast('Fill in To, Subject and body', true); return; }
  status.textContent = 'Sending...';
  try {
    await api('/email/send', { method: 'POST', body: { from, fromName: 'ULearn', to, subject, html, studentId, templateId } });
    status.textContent = '';
    toast('Sent to ' + to);
    document.getElementById('pvCommsSubject').value = '';
    document.getElementById('pvCommsEditor').innerHTML = '';
    document.getElementById('pvCommsTpl').value = '';
    loadPvCommsHistory(studentId);
  } catch(e) { status.textContent = ''; toast(e.message, true); }
}

async function loadPvCommsHistory(studentId) {
  const container = document.getElementById('pvCommsHistory');
  if (!container) return;
  try {
    const logs = await api('/email/history/' + studentId);
    if (!logs || logs.length === 0) { container.innerHTML = ''; return; }
    const visible = logs.slice(0, 3);
    let html = '<table style="width:100%;font-size:12px;border-collapse:collapse">';
    for (const log of visible) {
      const date = new Date(log.createdAt).toLocaleDateString('en-IE', {day:'2-digit',month:'short'});
      const time = new Date(log.createdAt).toLocaleTimeString('en-IE', {hour:'2-digit',minute:'2-digit'});
      let teaser = log.bodyHtml.replace(/<br\s*\/?>/gi,' ').replace(/<[^>]+>/g,'').replace(/&nbsp;/g,' ').replace(/&amp;/g,'&').replace(/\s+/g,' ').trim();
      teaser = teaser.replace(/^Dear\s+[^,]+,\s*/i, '');
      teaser = teaser.substring(0, 120) + (teaser.length > 120 ? '...' : '');
      html += '<tr style="border-top:1px solid var(--card-border);cursor:pointer" onclick="toggleEmailDetail('+log.id+')">' +
        '<td style="padding:8px 12px;width:65px;font-family:var(--font-mono);color:var(--text-muted);white-space:nowrap;font-size:11px">'+date+'<br>'+time+'</td>' +
        '<td style="padding:8px 4px"><strong style="font-size:12px">'+esc(log.subject)+'</strong><br><span style="color:var(--text-muted);font-size:11px">'+esc(teaser)+'</span></td></tr>' +
        '<tr id="emailDetail-'+log.id+'" style="display:none"><td colspan="2" style="padding:0 12px 12px;background:var(--bg-subtle)">' +
        '<div style="max-height:200px;overflow-y:auto;padding:10px;background:#fff;border:1px solid var(--card-border);border-radius:4px;font-size:12px;margin-top:4px">'+log.bodyHtml+'</div></td></tr>';
    }
    html += '</table>';
    if (logs.length > 3) {
      html += '<div style="padding:6px 12px;text-align:center;border-top:1px solid var(--card-border)"><a href="#" onclick="event.preventDefault();navigate(\'student-detail\',{id:'+studentId+'})" style="font-size:11px;color:var(--accent)">View all '+logs.length+' emails →</a></div>';
    }
    container.innerHTML = html;
  } catch(e) { container.innerHTML = ''; }
}

async function loadPvDocs(studentId) {
  const container = document.getElementById('pvDocsBody');
  if (!container) return;
  try {
    const docs = await api('/documents?studentId=' + studentId);
    if (!docs || docs.length === 0) { container.innerHTML = '<div style="color:var(--text-muted);font-size:12px">No documents</div>'; return; }
    let html = '';
    for (const d of docs) {
      const typeName = d.template?.name || d.documentType;
      const statusCls = d.status === 'ISSUED' ? 'badge-confirmed' : d.status === 'DRAFT' ? 'badge-enquiry' : 'badge-cancelled';
      html += '<div style="padding:6px 0;border-bottom:1px solid var(--card-border);font-size:12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="navigate(\'document-detail\',{id:'+d.id+'})">' +
        '<span>'+esc(typeName)+' <span class="badge '+statusCls+'" style="font-size:10px">'+d.status+'</span></span>' +
        '<span style="font-family:var(--font-mono);color:var(--text-muted);font-size:11px">'+(d.issuedAt ? formatDate(d.issuedAt) : 'draft')+'</span></div>';
    }
    container.innerHTML = html;
  } catch(e) { container.innerHTML = '<div style="color:var(--text-muted);font-size:12px">Error loading</div>'; }
}

      const now = new Date();
      const liveBookings = s.bookings.filter(b => {
        const hasLiveCourse = b.courses?.some(c => new Date(c.startDate) <= now && new Date(c.endDate) >= now);
        const hasLiveAccomm = b.accommodations?.some(a => new Date(a.startDate) <= now && new Date(a.endDate) >= now);
        return hasLiveCourse || hasLiveAccomm;
      });
      const futureBookings = s.bookings.filter(b => {
        const allStart = [...(b.courses||[]).map(c=>c.startDate), ...(b.accommodations||[]).map(a=>a.startDate)].filter(Boolean);
        const earliest = allStart.length ? new Date(allStart.sort()[0]) : null;
        return earliest && earliest > now && !liveBookings.includes(b);
      });
      const pastBookings = s.bookings.filter(b => !liveBookings.includes(b) && !futureBookings.includes(b));

      // ── LIVE + UPCOMING BOOKINGS (expanded, full detail) ──
      const activeBookings = [...liveBookings.map(b => ({...b, _state:'live'})), ...futureBookings.map(b => ({...b, _state:'upcoming'}))];
      for (const b of activeBookings) {
        const isLive = b._state === 'live';
        const stateColor = isLive ? 'var(--success)' : 'var(--accent)';
        const stateBg = isLive ? '#f0fdf4' : '#eff3fe';
        const stateLabel = isLive ? 'Live' : 'Upcoming';
        const courseNames = b.courses?.map(c => c.name).join(', ') || '—';

        html += `<div class="card" style="margin-bottom:16px;border-left:4px solid ${stateColor}">
          <div class="card-header" style="padding:14px 18px;background:${stateBg}">
            <h3 style="font-size:15px;display:flex;align-items:center;gap:8px">
              <span style="background:${stateColor};color:#fff;font-size:10px;padding:2px 8px;border-radius:8px;text-transform:uppercase;letter-spacing:0.5px">${stateLabel}</span>
              ${statusBadge(b.status)}
              Booking #${b.id}
            </h3>
            <span class="amount" style="font-size:16px;font-weight:700">${formatMoney(b.amountTotal)}</span>
          </div>
          <div class="card-body" style="padding:16px 18px">

            <!-- Financial Summary -->
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;padding:12px;background:var(--bg-subtle);border-radius:var(--radius)">
              <div><span class="form-label">Total</span><div class="amount" style="font-size:16px">${formatMoney(b.amountTotal)}</div></div>
              <div><span class="form-label">Paid</span><div class="amount amount-positive" style="font-size:16px">${formatMoney(b.amountPaid)}</div></div>
              <div><span class="form-label">Balance</span><div class="amount ${parseFloat(b.amountOpen||0) > 0 ? 'amount-negative' : ''}" style="font-size:16px">${formatMoney(b.amountOpen)}</div></div>
            </div>

            <!-- Courses -->
            <div style="margin-bottom:12px">
              <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-muted);margin-bottom:6px">Courses</div>`;

        for (const c of (b.courses || [])) {
          const cStart = new Date(c.startDate);
          const cEnd = new Date(c.endDate);
          const isCourseLive = cStart <= now && cEnd >= now;
          const isCourseUpcoming = cStart > now;
          const totalDays = Math.ceil((cEnd - cStart) / 86400000);
          const elapsed = Math.ceil((now - cStart) / 86400000);
          const progress = totalDays > 0 ? Math.min(100, Math.max(0, Math.round((elapsed / totalDays) * 100))) : 0;
          const daysUntilStart = isCourseUpcoming ? Math.ceil((cStart - now) / 86400000) : 0;
          const courseBorderColor = isCourseLive ? 'var(--success)' : isCourseUpcoming ? 'var(--accent)' : '';

          html += `<div class="nested-item" style="padding:10px 12px;margin-bottom:6px;${courseBorderColor ? 'border-left:3px solid '+courseBorderColor+';' : ''}">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <strong style="font-size:13px">${esc(c.name)}</strong>
              <div style="display:flex;align-items:center;gap:6px">
                ${isCourseLive ? '<span style="font-size:10px;color:var(--success);font-weight:600">IN PROGRESS</span>' : ''}
                ${isCourseUpcoming ? '<span style="font-size:10px;color:var(--accent);font-weight:600">STARTS IN '+daysUntilStart+'d</span>' : ''}
                <span style="font-size:11px;color:var(--text-muted)">${c.category}</span>
              </div>
            </div>
            <div style="display:flex;gap:12px;font-size:12px;color:var(--text-secondary);margin-top:4px">
              ${c.level ? '<span class="badge badge-confirmed" style="font-size:10px">'+c.level+'</span>' : ''}
              <span style="font-family:var(--font-mono)">${formatDate(c.startDate)} — ${formatDate(c.endDate)}</span>
              <span>${c.weeks}w &middot; ${c.hoursPerWeek || '?'}h/wk</span>
              <span class="amount">${formatMoney(c.fee)}</span>
            </div>
            ${isCourseLive ? `<div style="margin-top:6px">
              <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-muted);margin-bottom:2px">
                <span>Week ${Math.ceil(elapsed/7)} of ${c.weeks}</span>
                <span>${progress}%</span>
              </div>
              <div style="height:4px;background:#e5e4e0;border-radius:2px;overflow:hidden">
                <div style="width:${progress}%;height:100%;background:var(--success);border-radius:2px"></div>
              </div>
            </div>` : ''}
          </div>`;
        }

        html += `</div>`;

        // Accommodation
        if (b.accommodations?.length > 0) {
          html += `<div style="margin-bottom:12px">
            <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-muted);margin-bottom:6px">Accommodation</div>`;
          for (const a of b.accommodations) {
            const aLive = new Date(a.startDate) <= now && new Date(a.endDate) >= now;
            html += `<div class="nested-item" style="padding:10px 12px;margin-bottom:6px;border-left:2px solid var(--warning)">
              <div style="display:flex;justify-content:space-between;align-items:center">
                <strong style="font-size:13px">${esc(a.accommodationType || 'Accommodation')}</strong>
                <div>
                  ${aLive ? '<span style="font-size:10px;color:var(--success);font-weight:600;margin-right:6px">CURRENT</span>' : ''}
                  <span style="font-size:11px;color:var(--text-muted)">${esc(a.board || '')}</span>
                </div>
              </div>
              <div style="display:flex;gap:12px;font-size:12px;color:var(--text-secondary);margin-top:4px">
                ${a.roomType ? '<span>'+esc(a.roomType)+'</span>' : ''}
                <span style="font-family:var(--font-mono)">${formatDate(a.startDate)} — ${formatDate(a.endDate)}</span>
                <span class="amount">${formatMoney(a.fee)}</span>
              </div>
            </div>`;
          }
          html += `</div>`;
        }

        // Agency
        if (b.agency) {
          html += `<div style="font-size:12px;color:var(--text-muted);margin-bottom:12px">Agency: <strong>${esc(b.agency.name)}</strong></div>`;
        }

        html += `<button class="btn btn-sm btn-secondary" onclick="navigate('booking-detail',{id:${b.id}})">View / Edit Booking</button>
          </div>
        </div>`;
      }

      // ── PAST BOOKINGS (History) ──
      if (pastBookings.length > 0) {
        html += `<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-muted);margin:16px 0 8px">History (${pastBookings.length})</div>`;
        for (const b of pastBookings) {
          const courseNames = b.courses?.map(c => c.name).join(', ') || '—';
          html += `<div class="card" style="margin-bottom:8px;opacity:0.75">
            <div class="card-header collapse-header" onclick="toggleCollapse(this)" style="padding:10px 18px">
              <h3 style="font-size:13px;display:flex;align-items:center;gap:8px">
                <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted)">#${b.id}</span>
                ${statusBadge(b.status)}
                ${esc(courseNames)}
              </h3>
              <span class="amount">${formatMoney(b.amountTotal)}</span>
            </div>
            <div class="card-body collapse-body" style="padding:12px 18px">
              ${renderBookingSummary(b)}
              <button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();navigate('booking-detail',{id:${b.id}})" style="margin-top:8px">View / Edit</button>
            </div>
          </div>`;
        }
      }

      if (liveBookings.length === 0 && futureBookings.length === 0 && pastBookings.length === 0) {
        html += `<div class="card"><div class="card-body" style="text-align:center;color:var(--text-muted);padding:30px">No bookings yet</div></div>`;
      }
    } else {
      html += `<div class="card"><div class="card-body" style="text-align:center;color:var(--text-muted);padding:30px">No bookings yet</div></div>`;
    }

    html += `</div></div>`;
    document.getElementById('content').innerHTML = html;
    loadCommsHistory(s.id);
    loadEmailTemplateOptions();
  } catch (e) { toast(e.message, true); }
}

function openCommsCompose(studentId, email, firstName) {
  // Expand the comms card if collapsed
  const header = document.querySelector('#commsCard .collapse-header');
  const body = document.getElementById('commsBody');
  if (body && body.style.display === 'none') {
    if (header) toggleCollapse(header);
  }
  // Show compose
  const compose = document.getElementById('commsCompose');
  if (compose) compose.style.display = 'block';

  const toField = document.getElementById('commsTo');
  if (toField && email) toField.value = email;

  setTimeout(() => document.getElementById('commsSubject')?.focus(), 100);
  // Scroll to comms card
  document.getElementById('commsCard')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

  'academic': 'Academic',
  'accomm/confirm-provider': 'Accomm / Provider',
  'accomm/confirm-student': 'Accomm / Student',
  'accomm/transfer': 'Accomm / Transfer',

async function loadEmailTemplateOptions() {
  try {
    const templates = await api('/documents/templates?all=true&type=email');
    const sel = document.getElementById('commsTpl');
    if (!sel) return;

    // Group by category
    const groups = {};
    for (const t of templates) {
      const cat = t.category || 'other';
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push(t);
    }

    let html = '<option value="">None — blank</option>';
    for (const cat of Object.keys(EMAIL_CAT_LABELS)) {
      const items = groups[cat];
      if (!items || items.length === 0) continue;
      html += `<optgroup label="${EMAIL_CAT_LABELS[cat]}">`;
      for (const t of items) {
        html += `<option value="${t.id}">${esc(t.name)}</option>`;
      }
      html += '</optgroup>';
    }
    // Any categories not in the predefined list
    for (const cat of Object.keys(groups)) {
      if (EMAIL_CAT_LABELS[cat]) continue;
      html += `<optgroup label="${esc(cat)}">`;
      for (const t of groups[cat]) {
        html += `<option value="${t.id}">${esc(t.name)}</option>`;
      }
      html += '</optgroup>';
    }
    sel.innerHTML = html;
  } catch (e) {}
}

async function loadEmailTemplate(studentId) {
  const tplId = document.getElementById('commsTpl')?.value;
  if (!tplId) {
    document.getElementById('commsEditor').innerHTML = '';
    document.getElementById('commsSubject').value = '';
    return;
  }
  try {
    const tpl = await api('/documents/templates/' + tplId);
    if (!tpl) return;
    // Resolve tokens for this student
    const tokens = await api('/documents/tokens/' + studentId);
    let html = tpl.htmlTemplate;
    // Replace tokens
    html = html.replace(/\{\{([^}]+)\}\}/g, (m, key) => {
      const k = key.trim();
      return tokens[k] !== undefined ? tokens[k] : m;
    });
    document.getElementById('commsEditor').innerHTML = html;
    document.getElementById('commsSubject').value = tpl.name;
  } catch (e) { toast(e.message, true); }
}

async function sendCommsEmail(studentId) {
  const from = document.getElementById('commsFrom')?.value;
  const to = document.getElementById('commsTo')?.value;
  const subject = document.getElementById('commsSubject')?.value;
  const html = document.getElementById('commsEditor')?.innerHTML;
  const templateId = document.getElementById('commsTpl')?.value || null;
  const status = document.getElementById('commsSendStatus');

  if (!to || !subject || !html?.trim()) { toast('Fill in To, Subject and body', true); return; }

  status.textContent = 'Sending...';
  try {
    await api('/email/send', { method: 'POST', body: { from, fromName: 'ULearn', to, subject, html, studentId, templateId } });
    status.textContent = '';
    toast('Sent to ' + to);
    document.getElementById('commsSubject').value = '';
    document.getElementById('commsEditor').innerHTML = '';
    document.getElementById('commsTpl').value = '';
    loadCommsHistory(studentId);
  } catch (e) {
    status.textContent = '';
    toast(e.message, true);
  }
}

async function loadCommsHistory(studentId) {
  const container = document.getElementById('commsHistory');
  if (!container) return;
  try {
    const logs = await api('/email/history/' + studentId);
    const countEl = document.getElementById('commsCount');

    if (!logs || logs.length === 0) {
      container.innerHTML = '';
      if (countEl) countEl.textContent = '';
      return;
    }

    if (countEl) countEl.textContent = `(${logs.length})`;

    const visible = logs.slice(0, 3);
    let html = '<table style="width:100%;font-size:12px;border-collapse:collapse">';
    for (const log of visible) {
      const date = new Date(log.createdAt).toLocaleDateString('en-IE', {day:'2-digit',month:'short'});
      const time = new Date(log.createdAt).toLocaleTimeString('en-IE', {hour:'2-digit',minute:'2-digit'});
      // Strip HTML to get plain text teaser, skip past "Dear X," if present
      let teaser = log.bodyHtml.replace(/<br\s*\/?>/gi,' ').replace(/<[^>]+>/g,'').replace(/&nbsp;/g,' ').replace(/&amp;/g,'&').replace(/\s+/g,' ').trim();
      teaser = teaser.replace(/^Dear\s+[^,]+,\s*/i, '');
      teaser = teaser.substring(0, 120) + (teaser.length > 120 ? '...' : '');
      html += `<tr style="border-bottom:1px solid var(--card-border);cursor:pointer" onclick="toggleEmailDetail(${log.id})">
        <td style="padding:8px 12px;width:65px;font-family:var(--font-mono);color:var(--text-muted);white-space:nowrap;font-size:11px">${date}<br>${time}</td>
        <td style="padding:8px 4px"><strong style="font-size:12px">${esc(log.subject)}</strong><br><span style="color:var(--text-muted);font-size:11px">${esc(teaser)}</span></td>
      </tr>
      <tr id="emailDetail-${log.id}" style="display:none">
        <td colspan="2" style="padding:0 12px 12px;background:var(--bg-subtle)">
          <div style="max-height:300px;overflow-y:auto;padding:12px;background:#fff;border:1px solid var(--card-border);border-radius:4px;font-size:13px;margin-top:4px">${log.bodyHtml}</div>
        </td>
      </tr>`;
    }
    html += '</table>';
    if (logs.length > 3) {
      html += `<div style="padding:8px 12px;text-align:center;border-top:1px solid var(--card-border)">
        <a href="#" onclick="event.preventDefault();showAllCommsHistory(${studentId})" style="font-size:12px;color:var(--accent)">View all ${logs.length} emails</a>
      </div>`;
    }
    container.innerHTML = html;
  } catch (e) {
    container.innerHTML = '';
  }
}

async function saveStudent(id) {
  const data = collectFormData('studentForm');
  Object.assign(data, collectFormData('studentFormAddr'));
  Object.assign(data, collectFormData('studentFormEmergency'));
  Object.assign(data, collectFormData('studentFormBilling'));
  Object.assign(data, collectFormData('studentFormVisa'));
  Object.assign(data, collectFormData('studentFormOther'));
  Object.assign(data, collectFormData('studentFormExt'));
  // Convert numeric fields
  if (data.gender) data.gender = parseInt(data.gender) || null;
  if (data.fideloContactId) data.fideloContactId = parseInt(data.fideloContactId) || null;
  // Clean empty strings to null
  for (const k of Object.keys(data)) { if (data[k] === '') data[k] = null; }
  try {
    await api('/students/' + id, { method: 'PATCH', body: data });
    toast('Student saved');
  } catch (e) { toast(e.message, true); }
}

async function deleteStudent(id) {
  if (!confirm('Delete this student? This cannot be undone.')) return;
  try {
    await api('/students/' + id, { method: 'DELETE' });
    toast('Student deleted');
    navigate('students');
  } catch (e) { toast(e.message, true); }
}

    html += `</div></div>`;

    html += `</div></div>`;

function calcBalance() {
  const form = document.getElementById('bookingForm');
  if (!form) return;
  const total = parseFloat(form.querySelector('[data-field="amountTotal"]')?.value) || 0;
  const paid = parseFloat(form.querySelector('[data-field="amountPaid"]')?.value) || 0;
  const balanceField = form.querySelector('[data-field="amountOpen"]');
  if (balanceField) balanceField.value = (total - paid).toFixed(2);
}

async function saveBooking(id) {
  const data = collectFormData('bookingForm');
  if (data.amountTotal) data.amountTotal = parseFloat(data.amountTotal) || null;
  if (data.amountPaid) data.amountPaid = parseFloat(data.amountPaid) || null;
  if (data.amountOpen) data.amountOpen = parseFloat(data.amountOpen) || null;
  for (const k of Object.keys(data)) { if (data[k] === '') data[k] = null; }
  try {
    await api('/bookings/' + id, { method: 'PATCH', body: data });
    toast('Booking saved');
    showBookingDetail(id);
  } catch (e) { toast(e.message, true); }
}

async function deleteBooking(id) {
  if (!confirm('Delete this booking? This cannot be undone.')) return;
  try {
    await api('/bookings/' + id, { method: 'DELETE' });
    toast('Booking deleted');
    navigate('bookings');
  } catch (e) { toast(e.message, true); }
}

async function createBooking() {
  const data = collectFormData('newBookingForm');
  if (!data.studentId) { toast('Student is required', true); return; }
  data.studentId = parseInt(data.studentId);
  if (data.amountTotal) data.amountTotal = parseFloat(data.amountTotal);
  for (const k of Object.keys(data)) { if (data[k] === '') data[k] = null; }

  const course = collectFormData('newBookingCourse');
  if (course.name) {
    if (course.weeks) course.weeks = parseInt(course.weeks);
    if (course.hoursPerWeek) course.hoursPerWeek = parseFloat(course.hoursPerWeek);
    if (course.fee) course.fee = parseFloat(course.fee);
    for (const k of Object.keys(course)) { if (course[k] === '') course[k] = null; }
    data.courses = [course];
  }

  const accom = collectFormData('newBookingAccom');
  if (accom.accommodationType || accom.startDate) {
    if (accom.weeks) accom.weeks = parseInt(accom.weeks);
    if (accom.fee) accom.fee = parseFloat(accom.fee);
    for (const k of Object.keys(accom)) { if (accom[k] === '') accom[k] = null; }
    data.accommodations = [accom];
  }

  try {
    const b = await api('/bookings', { method: 'POST', body: data });
    toast('Booking created');
    document.querySelector('.modal-overlay')?.remove();
    navigate('booking-detail', { id: b.id });
  } catch (e) { toast(e.message, true); }
}

// ─── CLASSES LIST ───────────────────────────────
let classSessionFilter = '', classLevelFilter = '';
let classListWeek = getMonday(new Date());

function getMonday(d) {
  const dt = new Date(d); dt.setHours(0,0,0,0);
  dt.setDate(dt.getDate() - ((dt.getDay() + 6) % 7));
  return dt;
}
function getFriday(mon) { const f = new Date(mon); f.setDate(f.getDate() + 4); return f; }
function fmtWeekLabel(mon) {
  const fri = getFriday(mon);
  return `${mon.toLocaleDateString('en-IE',{day:'2-digit',month:'short'})} — ${fri.toLocaleDateString('en-IE',{day:'2-digit',month:'short',year:'numeric'})}`;
}
function isoDate(d) { return d.toISOString().split('T')[0]; }
function isCurrentWeek(mon) { const now = getMonday(new Date()); return isoDate(mon) === isoDate(now); }

// ─── CLASS DETAIL (with weekly navigation) ──────
let classDetailWeek = getMonday(new Date());

async function showClassDetail(id, weekOverride) {
  if (weekOverride) classDetailWeek = getMonday(new Date(weekOverride));

  try {
    const [cls, classrooms, unassigned, classTeachers, covers, allTeachers] = await Promise.all([
      api('/classes/' + id),
      api('/classes/classrooms'),
      api('/classes/unassigned?weekOf=' + isoDate(classDetailWeek)),
      api('/classes/teachers/by-class/' + id),
      api('/classes/covers?classId=' + id),
      api('/classes/teachers/list'),
    ]);
    if (!cls) { toast('Class not found', true); return navigate('classes'); }

    // Filter assigned students to the selected week
    const mon = classDetailWeek;
    const fri = getFriday(mon);
    const weekStudents = (cls.studentAssignments || []).filter(a => {
      const ws = new Date(a.weekStart);
      const we = a.weekEnd ? new Date(a.weekEnd) : new Date('2099-12-31');
      return ws <= fri && we >= mon;
    });

    // Filter unassigned to matching session
    const matchingUnassigned = unassigned.filter(bc => {
      const cat = bc.category;
      if (cls.session === 'MORNING') return ['MORNING','MORNING_PLUS','INTENSIVE'].includes(cat);
      if (cls.session === 'AFTERNOON') return ['AFTERNOON','AFTERNOON_PLUS','INTENSIVE'].includes(cat);
      return true;
    });

    const weekLabel = fmtWeekLabel(classDetailWeek);
    const todayTag = isCurrentWeek(classDetailWeek) ? ' <span style="background:var(--accent);color:#fff;padding:1px 6px;border-radius:8px;font-size:10px;vertical-align:middle">THIS WEEK</span>' : '';

    setTopbar(
      cls.name,
      `<span onclick="navigate('classes')">Classes</span> / ${cls.name}`,
      `<button class="btn btn-danger btn-sm" onclick="deleteClassItem(${cls.id})">Delete</button>`
    );

    const dayNames = ['','Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const days = (cls.days || []).map(d => dayNames[d]).join(', ');

    let html = `
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:16px">
      <button class="btn btn-secondary btn-sm" onclick="classDetailWeek.setDate(classDetailWeek.getDate()-7);showClassDetail(${id})">&larr; Prev Week</button>
      <span style="font-weight:600;font-size:14px;min-width:240px;text-align:center">${weekLabel}${todayTag}</span>
      <button class="btn btn-secondary btn-sm" onclick="classDetailWeek.setDate(classDetailWeek.getDate()+7);showClassDetail(${id})">Next Week &rarr;</button>
      ${!isCurrentWeek(classDetailWeek) ? `<button class="btn btn-ghost btn-sm" onclick="classDetailWeek=getMonday(new Date());showClassDetail(${id})">Today</button>` : ''}
    </div>

    <div class="detail-grid"><div>
      <div class="card" style="margin-bottom:16px">
        <div class="card-header"><h3>Class Info</h3><button class="btn btn-sm btn-secondary" onclick="saveClass(${cls.id})">Save Changes</button></div>
        <div class="card-body">
          <div class="form-grid" id="classForm">
            ${field('name','Name',cls.name)}
            ${selectField('level','Level',cls.level,[['A1','A1'],['A2','A2'],['B1','B1'],['B2','B2'],['C1','C1'],['C2','C2']])}
            ${selectField('session','Session',cls.session,[['MORNING','Morning'],['AFTERNOON','Afternoon']])}
            <div class="form-group">
              <label class="form-label">Classroom</label>
              <select class="form-select" data-field="classroomId">
                ${classrooms.map(r => `<option value="${r.id}" ${r.id===cls.classroomId?'selected':''}>${esc(r.name)}</option>`).join('')}
              </select>
            </div>
            ${field('startTime','Start Time',cls.startTime?.slice(0,5),'time')}
            ${field('endTime','End Time',cls.endTime?.slice(0,5),'time')}
            ${checkboxField('active','Active',cls.active)}
          </div>
          <div style="margin-top:10px;font-size:12px;color:var(--text-secondary)">Days: ${days}</div>
        </div>
      </div>

      <div class="card" style="margin-bottom:16px">
        <div class="card-header"><h3>Teacher</h3></div>
        <div class="card-body">`;

    // Find active teacher for this week
    const activeTeacher = classTeachers.find(ct => {
      const s = new Date(ct.startDate);
      const e = ct.endDate ? new Date(ct.endDate) : new Date('2099-12-31');
      return s <= fri && e >= mon;
    });

    const teacherOpts = allTeachers.map(t => `<option value="${t.id}">${esc(t.lastName)}, ${esc(t.firstName)}${t.hourlyRate ? ' (€'+t.hourlyRate+'/hr)' : ''}${t.isSalaried ? ' [salaried]' : ''}</option>`).join('');

    if (activeTeacher) {
      html += `<div style="display:flex;align-items:center;justify-content:space-between">
        <div>
          <strong>${esc(activeTeacher.teacher.lastName)}, ${esc(activeTeacher.teacher.firstName)}</strong>
          <span style="color:var(--text-muted);font-size:12px;margin-left:8px">since ${formatDate(activeTeacher.startDate)}${activeTeacher.endDate ? ' until '+formatDate(activeTeacher.endDate) : ''}</span>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="removeDefaultTeacher(${activeTeacher.id},${cls.id})" style="color:var(--danger)">Remove</button>
      </div>`;
    } else {
      html += `<div style="display:flex;gap:8px;align-items:center">
        <select class="form-select" id="assignTeacherSelect" style="width:auto">${teacherOpts}</select>
        <button class="btn btn-sm btn-primary" onclick="assignDefaultTeacher(${cls.id})">Assign Teacher</button>
      </div>`;
    }

    // Covers for this week
    const weekCovers = covers.filter(c => {
      const d = new Date(c.date);
      return d >= mon && d <= fri;
    });

    if (weekCovers.length > 0) {
      html += `<div style="margin-top:12px"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-muted);margin-bottom:6px">Covers This Week</div>`;
      for (const c of weekCovers) {
        html += `<div class="nested-item" style="padding:8px 12px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <span style="font-family:var(--font-mono);font-size:12px">${formatDate(c.date)} ${c.startTime?.slice(0,5)}–${c.endTime?.slice(0,5)}</span>
              <span style="color:var(--danger);font-size:12px;margin:0 6px">${esc(c.originalTeacher?.lastName)}</span>
              <span style="color:var(--text-muted)">&rarr;</span>
              <span style="color:var(--success);font-size:12px;margin:0 6px">${esc(c.coverTeacher?.lastName)}, ${esc(c.coverTeacher?.firstName)}</span>
              ${c.reason ? `<span style="color:var(--text-muted);font-size:11px">(${esc(c.reason)})</span>` : ''}
            </div>
            <button class="btn btn-ghost btn-sm" onclick="removeCoverRecord(${c.id},${cls.id})" style="color:var(--danger)">&times;</button>
          </div>
        </div>`;
      }
      html += `</div>`;
    }

    if (activeTeacher) {
      html += `<div style="margin-top:10px">
        <button class="btn btn-sm btn-secondary" onclick="openCoverModal(${cls.id},${activeTeacher.teacherId},'${cls.startTime}','${cls.endTime}')">+ Add Cover</button>
      </div>`;
    }

    html += `</div></div>

    </div><div>
      <div class="card" style="margin-bottom:16px">
        <div class="card-header"><h3>Students This Week (${weekStudents.length})</h3></div>
        <div class="card-body">`;

    if (weekStudents.length > 0) {
      html += `<div class="table-wrap"><table>
        <thead><tr><th>Student</th><th>Level</th><th>Course</th><th>Enrolled</th><th></th></tr></thead><tbody>`;
      for (const a of weekStudents) {
        const student = a.bookingCourse?.booking?.student;
        const sName = student ? `${student.lastName}, ${student.firstName}` : '—';
        const sId = student?.id;
        const level = student?.currentLevel || a.bookingCourse?.level || '?';
        html += `<tr>
          <td><span style="cursor:pointer;color:var(--accent);font-weight:500" onclick="navigate('student-detail',{id:${sId}})">${esc(sName)}</span></td>
          <td><span class="badge badge-confirmed">${level}</span></td>
          <td>${esc(a.bookingCourse?.name || '—')}</td>
          <td style="font-size:12px;font-family:var(--font-mono)">${formatDate(a.weekStart)} — ${formatDate(a.weekEnd)}</td>
          <td><button class="btn btn-ghost btn-sm" onclick="removeClassAssignment(${a.id},${cls.id})" style="color:var(--danger)">Remove</button></td>
        </tr>`;
      }
      html += `</tbody></table></div>`;
    } else {
      html += `<div style="color:var(--text-muted);font-size:13px">No students assigned for this week</div>`;
    }

    html += `</div></div>`;

    // Unassigned pool
    html += `<div class="card">
      <div class="card-header"><h3>Unassigned Students — ${cls.session === 'MORNING' ? 'Morning' : 'Afternoon'} (${matchingUnassigned.length})</h3></div>
      <div class="card-body">`;

    if (matchingUnassigned.length > 0) {
      html += `<div style="margin-bottom:10px">
        <input type="text" id="unassignedSearch" placeholder="Search by name..." oninput="filterUnassignedTable(this.value)"
          style="width:100%;max-width:300px;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary)">
      </div>`;
      html += `<div class="table-wrap"><table id="unassignedTable">
        <thead><tr><th>Student</th><th>Level</th><th>Course</th><th>Dates</th><th></th></tr></thead><tbody>`;
      for (const bc of matchingUnassigned) {
        const student = bc.booking?.student;
        const sName = student ? `${student.lastName}, ${student.firstName}` : '—';
        const level = student?.currentLevel || bc.level || '?';
        html += `<tr data-name="${esc(sName.toLowerCase())}">
          <td><strong>${esc(sName)}</strong></td>
          <td><span class="badge badge-confirmed">${level}</span></td>
          <td>${esc(bc.name)}</td>
          <td style="font-size:12px;font-family:var(--font-mono)">${formatDate(bc.startDate)} — ${formatDate(bc.endDate)}</td>
          <td><button class="btn btn-sm btn-primary" onclick="quickAssign(${bc.id},${cls.id})">Assign</button></td>
        </tr>`;
      }
      html += `</tbody></table></div>`;
    } else {
      html += `<div style="color:var(--text-muted);font-size:13px">All students assigned for this week</div>`;
    }

    html += `</div></div>`;
    html += `</div></div>`;
    document.getElementById('content').innerHTML = html;
  } catch (e) { toast(e.message, true); }
}

function filterUnassignedTable(query) {
  const q = query.toLowerCase().trim();
  const rows = document.querySelectorAll('#unassignedTable tbody tr');
  rows.forEach(row => {
    row.style.display = row.dataset.name.includes(q) ? '' : 'none';
  });
}

async function quickAssign(bookingCourseId, classId) {
  // Get the booking course dates to use as assignment range
  try {
    const res = await api('/bookings?limit=100');
    let startDate, endDate;
    for (const b of res.data) {
      for (const c of (b.courses || [])) {
        if (c.id === bookingCourseId) { startDate = c.startDate; endDate = c.endDate; break; }
      }
      if (startDate) break;
    }
    await api('/classes/assign', { method: 'POST', body: {
      bookingCourseId, classId,
      weekStart: startDate?.split('T')[0] || isoDate(classDetailWeek),
      weekEnd: endDate?.split('T')[0],
    }});
    toast('Student assigned');
    showClassDetail(classId);
  } catch (e) { toast(e.message, true); }
}

async function assignDefaultTeacher(classId) {
  const teacherId = document.getElementById('assignTeacherSelect')?.value;
  if (!teacherId) { toast('Select a teacher', true); return; }
  try {
    await api('/classes/teachers/assign', { method: 'POST', body: {
      classId, teacherId: parseInt(teacherId), startDate: isoDate(classDetailWeek)
    }});
    toast('Teacher assigned');
    showClassDetail(classId);
  } catch (e) { toast(e.message, true); }
}

async function removeDefaultTeacher(id, classId) {
  if (!confirm('Remove this teacher assignment?')) return;
  try {

async function showAttendance() {
  setTopbar('Attendance', '', '');

  try {
    const classes = await api('/classes');

      <div class="toolbar">
        <div style="display:flex;align-items:center;gap:6px">

          <span style="font-weight:600;font-size:14px;min-width:220px;text-align:center">${weekLabel}${todayTag}</span>
          <button class="btn btn-secondary btn-sm" onclick="attendanceWeek.setDate(attendanceWeek.getDate()+7);showAttendance()">&rarr;</button>
          ${!isCurrentWeek(attendanceWeek) ? '<button class="btn btn-ghost btn-sm" onclick="attendanceWeek=getMonday(new Date());showAttendance()">Today</button>' : ''}
        </div>
        <select class="filter-select" style="min-width:200px" onchange="attendanceClassId=parseInt(this.value)||null;loadWeeklyAttendance()">
          <option value="">Select a class...</option>
          ${classes.map(c => {
            const badge = c.session === 'MORNING' ? 'AM' : 'PM';
            return `<option value="${c.id}" ${c.id === attendanceClassId ? 'selected' : ''}>${esc(c.name)} (${badge} — ${c.classroom?.name || ''})</option>`;
          }).join('')}
        </select>

        <div class="table-wrap"><div class="table-empty">Select a class to view weekly attendance</div></div>

  } catch (e) { toast(e.message, true); }
}

async function loadWeeklyAttendance() {
  if (!attendanceClassId) return;
  const container = document.getElementById('attendanceContent');

  try {
    const data = await api('/attendance/week/' + attendanceClassId + '/' + isoDate(attendanceWeek));
    if (!data) { container.innerHTML = '<div class="table-wrap"><div class="table-empty">Class not found</div></div>'; return; }

    const dayLabels = ['Mon','Tue','Wed','Thu','Fri'];

    let html = `
      <div class="card">
        <div class="card-header">
          <h3>${esc(data.className)} ${data.classroom ? '— ' + esc(data.classroom) : ''}</h3>
          <div style="display:flex;gap:8px;align-items:center">
            ${data.teacher ? `<span style="font-size:12px;color:var(--text-secondary)">Teacher: <strong>${esc(data.teacher.lastName)}, ${esc(data.teacher.firstName)}</strong></span>` : ''}
            <span style="font-size:11px;color:var(--text-muted);font-family:var(--font-mono)">Block: ${data.blockHours}h</span>
          </div>
        </div>
        <div class="card-body" style="padding:0;overflow-x:auto">`;

    if (data.students.length === 0) {
      html += `<div style="color:var(--text-muted);font-size:13px;padding:30px;text-align:center">No students assigned for this week</div>`;
    } else {
      // Quick action buttons
      html += `<div style="padding:12px 14px;border-bottom:1px solid var(--card-border);display:flex;gap:8px">
        <button class="btn btn-sm btn-secondary" onclick="markAllWeek(true)">All Present (Week)</button>
        <button class="btn btn-sm btn-secondary" onclick="markAllWeek(false)">All Absent (Week)</button>
        <div style="flex:1"></div>
        <button class="btn btn-sm btn-primary" onclick="saveWeeklyAttendance()">Save Attendance</button>
      </div>`;

      html += `<table style="width:100%;border-collapse:collapse">
        <thead><tr>
          <th style="padding:8px 12px;text-align:left;min-width:180px;position:sticky;left:0;background:var(--bg-subtle);z-index:1">Student</th>`;

      // Day headers with date and cancel toggle
      for (let i = 0; i < 5; i++) {
        const dayDate = data.days[i];
        const cancelled = data.cancellations[i]?.cancelled;
        const shortDate = new Date(dayDate).toLocaleDateString('en-IE', { day:'2-digit', month:'short' });
        html += `<th style="padding:8px 6px;text-align:center;min-width:100px;${cancelled ? 'background:#fee2e2;' : ''}">
          <div>${dayLabels[i]}</div>
          <div style="font-size:10px;font-weight:400;color:var(--text-muted)">${shortDate}</div>
          ${cancelled ? '<div style="font-size:9px;color:#991b1b;cursor:pointer" onclick="toggleCancelDay('+attendanceClassId+',\''+dayDate+'\')">CANCELLED</div>' : ''}
        </th>`;
      }
      html += `</tr></thead><tbody>`;

      for (const s of data.students) {
        html += `<tr data-student-id="${s.studentId}">
          <td style="padding:6px 12px;border-bottom:1px solid #f0efec;position:sticky;left:0;background:#fff;z-index:1">
            <strong style="cursor:pointer;color:var(--accent);font-size:13px" onclick="navigate('student-detail',{id:${s.studentId}})">${esc(s.lastName)}, ${esc(s.firstName)}</strong>
            ${s.nationality ? '<span style="font-size:11px;color:var(--text-muted);margin-left:4px">'+countryName(s.nationality)+'</span>' : ''}
          </td>`;

        for (let i = 0; i < 5; i++) {
          const day = s.days[i];
          const cancelled = data.cancellations[i]?.cancelled;
          const isPresent = day.status === 'PRESENT' || day.status === 'LATE';
          const hours = day.hours != null ? parseFloat(day.hours) : (isPresent ? data.blockHours : null);
          const cellBg = cancelled ? '#fef2f2' : isPresent ? '#f0fdf4' : day.status === 'ABSENT_UNCERTIFIED' ? '#fef2f2' : '';

          html += `<td style="padding:4px 6px;text-align:center;border-bottom:1px solid #f0efec;${cellBg ? 'background:'+cellBg+';' : ''}" data-day="${i}" data-occ-id="${day.occurrenceId}">`;

          if (cancelled) {
            html += `<span style="font-size:10px;color:#991b1b">—</span>`;
          } else {
            html += `<div style="display:flex;align-items:center;justify-content:center;gap:4px">
              <input type="checkbox" ${isPresent ? 'checked' : ''} onchange="toggleDayCell(this,${data.blockHours})" style="accent-color:var(--success);cursor:pointer">
              <input type="number" value="${hours != null ? hours : ''}" step="0.5" min="0" max="${data.blockHours}" style="width:42px;font-size:11px;padding:2px 4px;border:1px solid var(--card-border);border-radius:3px;text-align:center;font-family:var(--font-mono)" placeholder="${data.blockHours}">
            </div>`;
          }
          html += `</td>`;
        }
        html += `</tr>`;
      }

      html += `</tbody></table>`;

      // Summary row
      html += `<div style="padding:10px 14px;border-top:1px solid var(--card-border);display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:12px;color:var(--text-muted)">${data.students.length} students</span>
        <button class="btn btn-primary" onclick="saveWeeklyAttendance()">Save Attendance</button>
      </div>`;
    }

    html += `</div></div>`;

    // Attendance sheet upload section
    html += `<div class="card" style="margin-top:12px">
      <div class="card-header">
        <h3>Attendance Sheets</h3>
        <label class="btn btn-sm btn-secondary" style="cursor:pointer;margin:0">
          Upload Image / PDF
          <input type="file" accept="image/*,.pdf" multiple hidden onchange="uploadAttendanceFiles(this.files)">
        </label>
      </div>
      <div class="card-body" id="attendanceUploads" style="min-height:40px">
        <div style="color:var(--text-muted);font-size:13px">Loading...</div>
      </div>
    </div>`;

    container.innerHTML = html;
    loadAttendanceUploads();
  } catch (e) { toast(e.message, true); }
}

async function loadAttendanceUploads() {
  const container = document.getElementById('attendanceUploads');
  if (!container || !attendanceClassId) return;
  try {
    const files = await api('/attendance/uploads/' + attendanceClassId + '/' + isoDate(attendanceWeek));
    if (files.length === 0) {
      container.innerHTML = '<div style="color:var(--text-muted);font-size:13px">No sheets uploaded for this week</div>';
      return;
    }
    let html = '<div style="display:flex;flex-wrap:wrap;gap:10px">';
    for (const f of files) {
      const isImage = /\.(jpg|jpeg|png|webp|gif)$/i.test(f.filename);
      const fileUrl = API + '/attendance/uploads/file/' + f.filename;
      html += `<div style="position:relative;border:1px solid var(--border);border-radius:6px;overflow:hidden;width:140px">
        ${isImage
          ? `<a href="${fileUrl}" target="_blank"><img src="${fileUrl}" style="width:140px;height:100px;object-fit:cover;display:block"></a>`
          : `<a href="${fileUrl}" target="_blank" style="display:flex;align-items:center;justify-content:center;height:100px;background:var(--bg-main);font-size:12px;color:var(--accent);text-decoration:none">PDF</a>`}
        <div style="padding:4px 6px;font-size:10px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(f.originalName)}">${esc(f.originalName)}</div>
        <button onclick="deleteAttendanceFile('${f.filename}')" style="position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.5);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;line-height:20px;text-align:center">&times;</button>
      </div>`;
    }
    html += '</div>';
    container.innerHTML = html;
  } catch (e) { container.innerHTML = '<div style="color:#991b1b;font-size:13px">Error loading uploads</div>'; }
}

async function uploadAttendanceFiles(fileList) {
  if (!attendanceClassId) { toast('Select a class first', true); return; }
  for (const file of fileList) {
    const form = new FormData();
    form.append('file', file);
    try {
      await fetch(API + '/attendance/upload/' + attendanceClassId + '/' + isoDate(attendanceWeek), { method: 'POST', body: form });
    } catch (e) { toast('Upload failed: ' + e.message, true); return; }
  }
  toast('Uploaded ' + fileList.length + ' file(s)');
  loadAttendanceUploads();
}

async function deleteAttendanceFile(filename) {
  if (!confirm('Delete this file?')) return;
  try {
    await api('/attendance/uploads/' + attendanceClassId + '/' + isoDate(attendanceWeek) + '/' + filename, { method: 'DELETE' });
    toast('File deleted');
    loadAttendanceUploads();
  } catch (e) { toast(e.message, true); }
}

function toggleDayCell(checkbox, blockHours) {
  const td = checkbox.closest('td');
  const hoursInput = td.querySelector('input[type="number"]');
  if (checkbox.checked) {
    if (!hoursInput.value) hoursInput.value = blockHours;
    td.style.background = '#f0fdf4';
  } else {
    hoursInput.value = '0';
    td.style.background = '#fef2f2';
  }
}

function markAllWeek(present) {
  document.querySelectorAll('#attendanceContent tbody td[data-day]').forEach(td => {
    const cb = td.querySelector('input[type="checkbox"]');
    const hrs = td.querySelector('input[type="number"]');
    if (!cb || !hrs) return;
    cb.checked = present;
    if (present) {
      const blockHrs = hrs.placeholder || '3';
      hrs.value = blockHrs;
      td.style.background = '#f0fdf4';
    } else {
      hrs.value = '0';
      td.style.background = '#fef2f2';
    }
  });
}

async function saveWeeklyAttendance() {
  const records = [];
  document.querySelectorAll('#attendanceContent tbody tr').forEach(tr => {
    const studentId = parseInt(tr.dataset.studentId);
    tr.querySelectorAll('td[data-day]').forEach(td => {
      const occId = parseInt(td.dataset.occId);
      const cb = td.querySelector('input[type="checkbox"]');
      const hrs = td.querySelector('input[type="number"]');
      if (!cb || !occId) return; // cancelled day

      const isPresent = cb.checked;
      const hours = parseFloat(hrs?.value) || 0;
      records.push({
        studentId,
        occurrenceId: occId,
        status: isPresent ? (hours < parseFloat(hrs.placeholder) ? 'LATE' : 'PRESENT') : 'ABSENT_UNCERTIFIED',
        hours,
      });
    });
  });

  if (records.length === 0) { toast('No records to save', true); return; }

  try {
    await api('/attendance/bulk', { method: 'POST', body: { records } });
    toast('Attendance saved (' + records.length + ' records)');
    loadWeeklyAttendance();
  } catch (e) { toast(e.message, true); }
}

async function toggleCancelDay(classId, date) {
  try {
    await api('/attendance/cancel/' + classId + '/' + date, { method: 'POST' });
    toast('Toggled');
    loadWeeklyAttendance();
  } catch (e) { toast(e.message, true); }
}
