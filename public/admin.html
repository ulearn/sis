// ─── DATE CALCULATORS ───────────────────────────
// Course: Start (Monday) + Weeks → End (Friday of last week)
function calcCourseEnd(trigger) {
  const form = trigger.closest('.form-grid') || trigger.closest('.modal-body');
  const startInput = form.querySelector('[data-field="startDate"]');
  const weeksInput = form.querySelector('[data-field="weeks"]');
  const endInput = form.querySelector('[data-field="endDate"]');
  if (!startInput?.value || !weeksInput?.value || !endInput) return;
  const start = new Date(startInput.value);
  const weeks = parseInt(weeksInput.value);
  if (isNaN(weeks) || weeks < 1) return;
  // End = start + (weeks * 7 - 3) days → lands on Friday
  const end = new Date(start.getTime() + (weeks * 7 - 3) * 86400000);
  endInput.value = end.toISOString().split('T')[0];
}

// Accommodation: Check-in + Weeks → Check-out (7 days per week, checkout on day 7)
function calcAccommEnd(trigger) {
  const form = trigger.closest('.form-grid') || trigger.closest('.modal-body');
  const startInput = form.querySelector('[data-field="startDate"]');
  const weeksInput = form.querySelector('[data-field="weeks"]');
  const endInput = form.querySelector('[data-field="endDate"]');
  if (!startInput?.value || !weeksInput?.value || !endInput) return;
  const start = new Date(startInput.value);
  const weeks = parseInt(weeksInput.value);
  if (isNaN(weeks) || weeks < 1) return;
  // End = start + (weeks * 7) days → checkout day
  const end = new Date(start.getTime() + weeks * 7 * 86400000);
  endInput.value = end.toISOString().split('T')[0];
}

// ─── FORM HELPERS ───────────────────────────────
function field(name, label, value, type = 'text') {
  return `<div class="form-group">
    <label class="form-label">${label}</label>
    <input class="form-input" type="${type}" data-field="${name}" value="${esc(value ?? '')}">
  </div>`;
}

function selectField(name, label, value, options) {
  const opts = options.map(([v, l]) => `<option value="${v}" ${String(value) === String(v) ? 'selected' : ''}>${l}</option>`).join('');
  return `<div class="form-group">
    <label class="form-label">${label}</label>
    <select class="form-select" data-field="${name}">${opts}</select>
  </div>`;
}

function countrySelect(name, label, value) {
  const val = (value || '').toUpperCase();
  let opts = '<option value="">—</option>';
  for (const [code, cname] of Object.entries(COUNTRIES)) {
    opts += `<option value="${code}" ${val === code ? 'selected' : ''}>${cname}</option>`;
  }
  return `<div class="form-group">
    <label class="form-label">${label}</label>
    <select class="form-select" data-field="${name}" style="max-width:100%">${opts}</select>
  </div>`;
}

function checkboxField(name, label, checked) {
  return `<div class="form-group">
    <label class="form-label">&nbsp;</label>
    <label class="form-checkbox"><input type="checkbox" data-field="${name}" ${checked ? 'checked' : ''}> ${label}</label>
  </div>`;
}

function collectFormData(containerId) {
  const container = document.getElementById(containerId);
  if (!container) return {};
  const data = {};
  container.querySelectorAll('[data-field]').forEach(el => {
    const key = el.dataset.field;
    if (el.type === 'checkbox') data[key] = el.checked;
    else data[key] = el.value;
  });
  return data;
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function paginationHtml(res, pageVar, fn) {
  return `<div class="pagination">
    <span>Showing ${res.data.length} of ${res.total}</span>
    <div class="pagination-btns">
      <button ${res.page <= 1 ? 'disabled' : ''} onclick="${pageVar}=${res.page-1};${fn}()">Prev</button>
      <span style="padding:4px 8px;font-family:var(--font-mono)">${res.page} / ${res.pages || 1}</span>
      <button ${res.page >= res.pages ? 'disabled' : ''} onclick="${pageVar}=${res.page+1};${fn}()">Next</button>
    </div>
  </div>`;
}

async function generateDocumentDraft() {
  const templateId = parseInt(document.getElementById('docTemplate')?.value);
  const studentId = parseInt(document.getElementById('docStudent')?.value);
  const bookingId = parseInt(document.getElementById('docBooking')?.value) || null;
  if (!templateId || !studentId) { toast('Select template and student', true); return; }

  try {
    const result = await api('/documents/generate', { method: 'POST', body: { templateId, studentId, bookingId } });
    if (result.missing && result.missing.length > 0) {
      toast('Draft created with ' + result.missing.length + ' missing token(s)', true);
    } else {
      toast('Draft generated');
    }
    navigate('document-detail', { id: result.record.id });
  } catch (e) { toast(e.message, true); }
}

async function showDocumentDetail(id) {
  setTopbar('Document', '<span onclick="navigate(\'documents\')">Documents</span> / Detail', '');

  try {
    const doc = await api('/documents/' + id);
    const isDraft = doc.status === 'DRAFT';
    const isIssued = doc.status === 'ISSUED';
    const typeName = doc.template?.name || doc.documentType;

    const statusCls = doc.status === 'ISSUED' ? 'badge-confirmed' : doc.status === 'DRAFT' ? 'badge-enquiry' : doc.status === 'SUPERSEDED' ? 'badge-pending' : 'badge-cancelled';

    let html = `<div style="display:flex;gap:16px;align-items:center;margin-bottom:16px">
      <h2 style="font-size:18px;font-weight:600">${esc(typeName)} — v${doc.versionNo}.0</h2>
      <span class="badge ${statusCls}">${doc.status}</span>
      ${isIssued ? '<span style="font-size:11px;color:var(--text-muted);font-family:var(--font-mono)">LOCKED</span>' : ''}
    </div>`;

    // Metadata
    html += `<div class="card" style="margin-bottom:16px"><div class="card-body" style="display:flex;gap:24px;flex-wrap:wrap;font-size:13px">
      <div><strong>Student ID:</strong> ${doc.studentId}</div>
      ${doc.bookingId ? `<div><strong>Booking:</strong> #${doc.bookingId}</div>` : ''}
      <div><strong>Template:</strong> ${esc(typeName)} v${doc.templateVersion}</div>
      ${doc.issuedAt ? `<div><strong>Issued:</strong> ${new Date(doc.issuedAt).toLocaleString()}</div>` : ''}
      ${doc.issuedBy ? `<div><strong>By:</strong> ${esc(doc.issuedBy)}</div>` : ''}
      ${doc.verificationToken ? `<div><strong>Verification:</strong> <a href="/sis/verify/${doc.verificationToken}" target="_blank" style="color:var(--accent)">/sis/verify/${doc.verificationToken.slice(0,8)}...</a></div>` : ''}
    </div></div>`;

    // Actions
    html += `<div style="display:flex;gap:8px;margin-bottom:16px">`;
    if (isDraft) {
      html += `<button class="btn btn-primary" onclick="issueDocument(${doc.id})">Issue Document</button>`;
    }
    if (isIssued) {
      html += `<button class="btn btn-secondary" onclick="createNewVersion(${doc.id})">Create New Version</button>`;
      html += `<button class="btn btn-danger btn-sm" onclick="revokeDocument(${doc.id})">Revoke</button>`;
    }
    html += `</div>`;

    // Content preview
    html += `<div class="card"><div class="card-header"><h3>Document Preview</h3>
      ${isDraft ? '<button class="btn btn-sm btn-secondary" onclick="toggleDocEdit()">Edit Content</button>' : ''}
    </div>
    <div class="card-body">
      <div id="docPreview" style="border:1px solid var(--card-border);border-radius:6px;padding:24px;background:#fff;max-height:600px;overflow-y:auto">${doc.contentHtml || '<em>No content</em>'}</div>
      ${isDraft ? `<div id="docEditWrap" style="display:none;margin-top:12px">
        <textarea id="docEditArea" style="width:100%;height:300px;font-family:var(--font-mono);font-size:12px;padding:10px;border:1px solid var(--card-border);border-radius:6px">${esc(doc.contentHtml || '')}</textarea>
        <div style="margin-top:8px;display:flex;gap:8px">
          <button class="btn btn-primary btn-sm" onclick="saveDocContent(${doc.id})">Save Changes</button>
          <button class="btn btn-ghost btn-sm" onclick="toggleDocEdit()">Cancel</button>
        </div>
      </div>` : ''}
    </div></div>`;

    // Dispatch history
    if (doc.dispatches && doc.dispatches.length > 0) {
      html += `<div class="card" style="margin-top:16px"><div class="card-header"><h3>Dispatch History</h3></div>
        <div class="card-body" style="padding:0"><table><thead><tr><th>Sent To</th><th>Method</th><th>By</th><th>Date</th></tr></thead><tbody>`;
      for (const d of doc.dispatches) {
        html += `<tr><td>${esc(d.sentToEmail)}</td><td>${d.deliveryMethod || '—'}</td><td>${d.sentBy || '—'}</td><td style="font-size:12px;font-family:var(--font-mono)">${new Date(d.createdAt).toLocaleString()}</td></tr>`;
      }
      html += `</tbody></table></div></div>`;
    }

    // Version chain
    if (doc.supersededBy && doc.supersededBy.length > 0) {
      html += `<div class="card" style="margin-top:16px"><div class="card-header"><h3>Newer Versions</h3></div><div class="card-body">`;
      for (const s of doc.supersededBy) {
        html += `<div style="margin-bottom:6px"><button class="btn btn-ghost btn-sm" onclick="navigate('document-detail',{id:${s.id}})">v${s.versionNo}.0 — ${s.status}</button></div>`;
      }
      html += `</div></div>`;
    }

    document.getElementById('content').innerHTML = html;
  } catch (e) { toast(e.message, true); }
}

function toggleDocEdit() {
  const wrap = document.getElementById('docEditWrap');
  if (wrap) wrap.style.display = wrap.style.display === 'none' ? 'block' : 'none';
}

async function saveDocContent(id) {
  const html = document.getElementById('docEditArea')?.value;
  try {
    await api('/documents/' + id, { method: 'PUT', body: { contentHtml: html } });
    toast('Content saved');
    showDocumentDetail(id);
  } catch (e) { toast(e.message, true); }
}

async function issueDocument(id) {
  if (!confirm('Issue this document? This will lock it permanently and generate a QR verification code.')) return;
  try {
    await api('/documents/' + id + '/issue', { method: 'POST', body: { issuedBy: 'admin' } });
    toast('Document issued and locked');
    showDocumentDetail(id);
  } catch (e) { toast(e.message, true); }
}

async function createNewVersion(id) {
  if (!confirm('Create a new version? The current document will be marked as superseded.')) return;
  try {
    const newDoc = await api('/documents/' + id + '/new-version', { method: 'POST' });
    toast('New version created as draft');
    navigate('document-detail', { id: newDoc.id });
  } catch (e) { toast(e.message, true); }
}

async function revokeDocument(id) {
  if (!confirm('Revoke this document? It will be marked as invalid on the verification page.')) return;
  try {
    await api('/documents/' + id + '/revoke', { method: 'POST' });
    toast('Document revoked');
    showDocumentDetail(id);
  } catch (e) { toast(e.message, true); }
}

let docTplActiveCat = 'success/visa';

function buildTree(tree, activeCat, onClickFn, counts, idSuffix) {
  let html = '';
  let lastParent = null;
  for (const node of tree) {
    if (node.parent && node.parent !== lastParent) {
      html += `<div style="padding:4px 10px 2px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);font-weight:600;margin-top:6px">${node.parent}</div>`;
      lastParent = node.parent;
    } else if (!node.parent && lastParent) {
      lastParent = null;
    }
    const cnt = counts[node.key] || 0;
    const indent = node.parent ? 'padding-left:22px;' : '';
    html += `<div class="tpl-tree-item ${activeCat === node.key ? 'active' : ''}" data-cat-${idSuffix}="${node.key}" onclick="${onClickFn}('${node.key}')" style="${indent}">
      <span class="tpl-tree-label">${node.label}</span>
      <span class="tpl-tree-count">${cnt}</span>
    </div>`;
  }
  return html;
}

function selectDocCat(cat) {
  docTplActiveCat = cat;
  document.querySelectorAll('[data-cat-doc]').forEach(el => {
    el.classList.toggle('active', el.getAttribute('data-cat-doc') === cat);
  });
  renderDocList();
}

function selectEmailCat(cat) {
  emailTplActiveCat = cat;
  document.querySelectorAll('[data-cat-email]').forEach(el => {
    el.classList.toggle('active', el.getAttribute('data-cat-email') === cat);
  });
  renderEmailList();
}

function renderDocList() {
  const container = document.getElementById('docTplList');
  if (!container) return;
  const items = docTplAll.filter(t => (t.category || 'letters') === docTplActiveCat);
  const catLabel = DOC_TREE.find(n => n.key === docTplActiveCat)?.label || docTplActiveCat;

  if (items.length === 0) {
    container.innerHTML = `<div style="padding:30px;text-align:center;color:var(--text-muted);font-size:13px">No templates in <strong>${esc(catLabel)}</strong></div>`;
    return;
  }

  let html = `<table style="width:100%"><thead><tr><th>Name</th><th>Slug</th><th>v</th><th>Status</th><th></th></tr></thead><tbody>`;
  for (const t of items) {

      <td style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted)">${esc(t.slug)}</td>

      </div>
      <div style="display:flex;gap:8px;margin-top:14px">
        <button class="btn btn-primary" onclick="saveTemplate(${id || 'null'})">${id ? 'Update' : 'Create'} Template</button>
        ${id ? `<label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
          <input type="checkbox" id="tplActive" ${template?.active !== false ? 'checked' : ''}> Active
        </label>` : ''}
        <button class="btn btn-ghost" onclick="navigate('document-templates')">Cancel</button>
      </div>
    </div>
  </div></div>`;

  document.getElementById('content').innerHTML = html;
  updateTplPreview();
  setTplView('split');
}

let tplSyncDirection = null; // 'code' or 'preview' — prevents feedback loops

function tokensToPills(html) {
  return html.replace(/\{\{([^}]+)\}\}/g, (m, key) => {
    const k = key.trim();
    if (k === 'document.qr') return '<span contenteditable="false" data-token="document.qr" style="display:inline-block;width:100px;height:100px;border:2px dashed #cbd5e1;border-radius:8px;text-align:center;line-height:100px;font-size:10px;color:#94a3b8;vertical-align:middle;user-select:all">QR Code</span>';
    return '<span contenteditable="false" data-token="' + k + '" style="background:#eff3fe;color:#2563eb;padding:1px 6px;border-radius:3px;font-size:12px;font-family:monospace;user-select:all">' + k + '</span>';
  });
}

function pillsToTokens(html) {
  const div = document.createElement('div');
  div.innerHTML = html;
  div.querySelectorAll('[data-token]').forEach(el => {
    el.replaceWith('{{' + el.dataset.token + '}}');
  });
  return div.innerHTML;
}

function updateTplPreview() {
  if (tplSyncDirection === 'preview') return;
  const html = document.getElementById('tplHtml')?.value || '';
  const preview = document.getElementById('tplPreviewPane');
  if (!preview) return;
  tplSyncDirection = 'code';
  preview.innerHTML = tokensToPills(html);
  tplSyncDirection = null;
}

function syncPreviewToCode() {
  if (tplSyncDirection === 'code') return;
  const preview = document.getElementById('tplPreviewPane');
  const textarea = document.getElementById('tplHtml');
  if (!preview || !textarea) return;
  tplSyncDirection = 'preview';
  textarea.value = pillsToTokens(preview.innerHTML);
  tplSyncDirection = null;
}

function tplExec(cmd, val) {
  document.execCommand(cmd, false, val || null);
  document.getElementById('tplPreviewPane')?.focus();
  syncPreviewToCode();
}

function tplExecLink() {
  const url = prompt('Enter URL:');
  if (url) tplExec('createLink', url);
}

function tplInsertToken() {
  const tokens = [
    'student.full_name','student.first_name','student.last_name','student.dob',
    'student.nationality','student.passport_number','student.passport_number_masked',
    'student.current_level','student.salutation','student.gender','student.allergies',
    'student.pronoun_subject','student.pronoun_possessive','student.pronoun_possessive_cap',
    'student.attendance_rate','student.visa_until','student.photo',
    'booking.reference','booking.start_date','booking.end_date',
    'booking.course_name','booking.course_level','booking.hours_per_week',
    'booking.weeks','booking.amount_total',
    'accommodation.contact_name','accommodation.provider_name','accommodation.address',
    'accommodation.phone','accommodation.email','accommodation.start_date',
    'accommodation.end_date','accommodation.weeks','accommodation.room_type','accommodation.board',
    'institution.name','institution.address',
    'document.issue_date','document.qr','document.verification_url','document.version','document.number',
    'custom.visa_note','custom.remarks','custom.additional_info',
  ];
  const sel = prompt('Insert token:\\n\\n' + tokens.map((t,i) => (i+1)+'. '+t).join('\\n') + '\\n\\nEnter number or type token name:');
  if (!sel) return;
  const token = /^\d+$/.test(sel.trim()) ? tokens[parseInt(sel.trim())-1] : sel.trim();
  if (!token) return;
  // Insert pill at cursor
  const pill = '<span contenteditable="false" data-token="' + token + '" style="background:#eff3fe;color:#2563eb;padding:1px 6px;border-radius:3px;font-size:12px;font-family:monospace;user-select:all">' + token + '</span>&nbsp;';
  document.execCommand('insertHTML', false, pill);
  syncPreviewToCode();
}

function setTplView(mode) {
  const code = document.getElementById('tplCodePane');
  const divider = document.getElementById('tplDivider');
  const previewCol = document.getElementById('tplPreviewCol');
  const btnSplit = document.getElementById('tplViewSplit');
  const btnCode = document.getElementById('tplViewCode');
  const btnPreview = document.getElementById('tplViewPreview');
  if (!code || !previewCol) return;

  [btnSplit, btnCode, btnPreview].forEach(b => { if (b) b.style.fontWeight = '400'; });

  if (mode === 'split') {
    code.style.display = 'flex'; code.style.flex = '1';
    divider.style.display = ''; previewCol.style.display = 'flex'; previewCol.style.flex = '1';
    if (btnSplit) btnSplit.style.fontWeight = '600';
  } else if (mode === 'code') {
    code.style.display = 'flex'; code.style.flex = '1';
    divider.style.display = 'none'; previewCol.style.display = 'none';
    if (btnCode) btnCode.style.fontWeight = '600';
  } else if (mode === 'preview') {
    code.style.display = 'none'; divider.style.display = 'none';
    previewCol.style.display = 'flex'; previewCol.style.flex = '1';
    if (btnPreview) btnPreview.style.fontWeight = '600';
  }
  updateTplPreview();
}

async function saveTemplate(id) {
  const cat = document.getElementById('tplCategory').value;
  const data = {
    name: document.getElementById('tplName').value,
    slug: document.getElementById('tplSlug').value,
    category: cat,
    documentType: cat,
    htmlTemplate: document.getElementById('tplHtml').value,
  };
  if (!data.name || !data.slug || !data.htmlTemplate) { toast('Fill in all required fields', true); return; }

  try {
    if (id) {
      const active = document.getElementById('tplActive')?.checked;
      await api('/documents/templates/' + id, { method: 'PUT', body: { ...data, active } });
      toast('Template updated');
    } else {
      await api('/documents/templates', { method: 'POST', body: data });
      toast('Template created');
    }
    navigate('document-templates');
  } catch (e) { toast(e.message, true); }
}
