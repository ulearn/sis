<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="/sis/public/favicon.ico?v=2">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULearn SIS - Login</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f4f3f0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .login-card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    width: 100%;
    max-width: 380px;
    padding: 40px;
  }
  .logo {
    text-align: center;
    margin-bottom: 8px;
    font-size: 22px;
    font-weight: 700;
    color: #1a1d23;
  }
  .subtitle {
    text-align: center;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #9b9ea6;
    margin-bottom: 32px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #4a4d56;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 14px;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #4f46e5; }
  button {
    width: 100%;
    padding: 11px;
    background: #4f46e5;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #4338ca; }
  .error {
    background: #fef2f2;
    color: #dc2626;
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">ULearn</div>
  <div class="subtitle">Student Information System</div>
  <div class="error" id="error"></div>
  <form id="loginForm">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" autocomplete="username" required autofocus>
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="current-password" required>
    <button type="submit">Sign In</button>
    <div style="text-align:center;margin-top:16px;">
      <a href="/sis/forgot" style="font-size:13px;color:#4f46e5;text-decoration:none;">Forgot password?</a>
    </div>
  </form>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('error');
  errEl.style.display = 'none';
  try {
    const res = await fetch('/sis/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (data.success) {
      window.location.href = '/sis/admin';
    } else {
      errEl.textContent = data.error || 'Invalid credentials';
      errEl.style.display = 'block';
    }
  } catch (err) {
    errEl.textContent = 'Connection error';
    errEl.style.display = 'block';
  }
});
</script>
</body>
</html>
