<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="/sis/public/favicon.ico?v=2">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULearn — Partner Portal</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f4f3f0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .login-card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    width: 100%;
    max-width: 400px;
    padding: 44px 40px;
  }
  .logo {
    text-align: center;
    margin-bottom: 6px;
    font-size: 24px;
    font-weight: 800;
    color: #1a1d23;
    letter-spacing: -0.02em;
  }
  .subtitle {
    text-align: center;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #339900;
    font-weight: 700;
    margin-bottom: 32px;
  }
  .field { margin-bottom: 18px; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #64748b;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    color: #1e293b;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus {
    border-color: #339900;
    box-shadow: 0 0 0 4px rgba(51, 153, 0, 0.08);
  }
  button {
    width: 100%;
    padding: 13px;
    background: #339900;
    color: #fff;
    border: none;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
    box-shadow: 0 8px 20px rgba(51, 153, 0, 0.25);
    margin-top: 6px;
  }
  button:hover { background: #2d8600; transform: translateY(-1px); }
  .error {
    background: #fef2f2;
    color: #dc2626;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }
  .footer-note {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: #9b9ea6;
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="login-card">
  <div class="logo">ULearn</div>
  <div class="subtitle">Partner Portal</div>
  <div class="error" id="error"></div>
  <form id="loginForm">
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required autofocus>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
    </div>
    <button type="submit">Sign In</button>
  </form>
  <div class="footer-note">ULearn English Language School — Dublin</div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('error');
  errEl.style.display = 'none';
  try {
    const res = await fetch('/sis/partners/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (data.success) {
      window.location.href = '/sis/partners';
    } else {
      errEl.textContent = data.error || 'Invalid credentials';
      errEl.style.display = 'block';
    }
  } catch (err) {
    errEl.textContent = 'Connection error';
    errEl.style.display = 'block';
  }
});
</script>
</body>
</html>
