<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="/sis/public/favicon.ico?v=2">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULearn SIS - Forgot Password</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f3f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .login-card { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); width: 100%; max-width: 380px; padding: 40px; }
  .logo { text-align: center; margin-bottom: 8px; font-size: 22px; font-weight: 700; color: #1a1d23; }
  .subtitle { text-align: center; font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; color: #9b9ea6; margin-bottom: 24px; }
  p.intro { font-size: 13px; color: #4a4d56; margin-bottom: 20px; line-height: 1.5; }
  label { display: block; font-size: 13px; font-weight: 600; color: #4a4d56; margin-bottom: 6px; }
  input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; margin-bottom: 16px; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: #4f46e5; }
  button { width: 100%; padding: 11px; background: #4f46e5; color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  button:hover { background: #4338ca; }
  button:disabled { background: #9ca3af; cursor: not-allowed; }
  .success { background: #f0fdf4; color: #166534; padding: 12px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; display: none; line-height: 1.5; }
  .back { text-align: center; margin-top: 16px; }
  .back a { font-size: 13px; color: #4f46e5; text-decoration: none; }
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">ULearn</div>
  <div class="subtitle">Reset Password</div>
  <div class="success" id="success">If an account exists for that email, a password reset link has been sent. Check your inbox.</div>
  <form id="forgotForm">
    <p class="intro">Enter your email address and we'll send you a link to reset your password.</p>
    <label for="email">Email address</label>
    <input type="email" id="email" name="email" autocomplete="email" required autofocus>
    <!-- Honeypot: hidden from real users; bots fill it -->
    <div style="position:absolute;left:-9999px;" aria-hidden="true">
      <label for="website">Website</label>
      <input type="text" id="website" name="website" tabindex="-1" autocomplete="off">
    </div>
    <button type="submit" id="submitBtn">Send Reset Link</button>
    <div class="back"><a href="/sis/login">← Back to login</a></div>
  </form>
</div>
<script>
document.getElementById('forgotForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Sending...';
  try {
    await fetch('/sis/auth/forgot', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value,
        website: document.getElementById('website').value,
      }),
    });
  } catch {}
  document.getElementById('forgotForm').style.display = 'none';
  document.getElementById('success').style.display = 'block';
});
</script>
</body>
</html>
